<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <title>New Inspection - Inspection Tool</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h2>Menu</h2>
            <ul>
                <li><a href="#">Users</a></li>
                <li><a href="inspection.html">Inspection Certificates</a></li>
                <li><a href="#">Settings</a></li>
                <li><a href="#">About</a></li>
            </ul>
        </div>
        <div class="main-content">
            <h1>New Inspection Certificate</h1>
            <form id="inspection-form">
                <div class="tab-nav">
                    <button type="button" class="tab-nav-btn active" data-tab="client">Client</button>
                    <button type="button" class="tab-nav-btn" data-tab="tracking">Tracking</button>
                    <button type="button" class="tab-nav-btn" data-tab="equipment">Equipment</button>
                    <button type="button" class="tab-nav-btn" data-tab="checklist">Checklist</button>
                    <button type="button" class="tab-nav-btn" data-tab="review">Review & Submit</button>
                </div>

                <div id="client" class="tab-content active">
                    <div class="form-group">
                        <label for="client_name">Client Name</label>
                        <input type="text" id="client_name" name="client_name" placeholder="Enter client's name" required>
                    </div>
                    <div class="form-group">
                        <label for="contact_person">Contact Person</label>
                        <input type="text" id="contact_person" name="contact_person" placeholder="Enter contact person's name">
                    </div>
                    <div class="form-group">
                        <label for="contact_phone">Contact Phone</label>
                        <input type="text" id="contact_phone" name="contact_phone" placeholder="Enter contact phone">
                    </div>
                    <div class="form-group">
                        <label for="location">Location</label>
                        <input type="text" id="location" name="location" placeholder="Enter location of inspection">
                    </div>
                </div>
                <div id="tracking" class="tab-content">
                    <div class="form-group">
                        <label for="inspection_date">Inspection Date</label>
                        <input type="date" id="inspection_date" name="inspection_date" required>
                    </div>
                    <div class="form-group">
                        <label for="issue_date">Issue Date</label>
                        <input type="date" id="issue_date" name="issue_date" required>
                    </div>
                    <div class="form-group">
                        <label for="next_inspection_date">Next Inspection Date</label>
                        <input type="date" id="next_inspection_date" name="next_inspection_date" required>
                    </div>
                    <div class="form-group">
                        <label for="certificate_no">Certificate Number</label>
                        <input type="text" id="certificate_no" name="certificate_no" placeholder="Enter certificate number">
                    </div>
                    <div class="form-group">
                        <label for="job_order_no">Job Order Number</label>
                        <input type="text" id="job_order_no" name="job_order_no" placeholder="Enter job order number">
                    </div>
                    <div class="form-group">
                        <label for="sticker_no">Sticker Number</label>
                        <input type="text" id="sticker_no" name="sticker_no" placeholder="Enter sticker number">
                    </div>
                    <div class="form-group">
                        <label for="dws_no">DWS Number</label>
                        <input type="text" id="dws_no" name="dws_no" placeholder="Enter DWS number">
                    </div>
                </div>
                <div id="equipment" class="tab-content">
                    <div class="form-group">
                        <label for="equipment_name">Equipment Name</label>
                        <select id="equipment_name" name="equipment_name">
                            <option value="FORKLIFT TRUCK">FORKLIFT TRUCK</option>
                            <option value="CRANE">CRANE</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="capacity">Capacity</label>
                        <select id="capacity" name="capacity">
                            <option value="3 TONS">3 TONS</option>
                            <option value="5 TONS">5 TONS</option>
                            <option value="7 TONS">7 TONS</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="manufacturer">Manufacturer</label>
                        <select id="manufacturer" name="manufacturer">
                            <option value="HELI">HELI</option>
                            <option value="TCM">TCM</option>
                            <option value="CAT">CAT</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="model">Model</label>
                        <select id="model" name="model">
                            <option value="CPCD70">CPCD70</option>
                            <option value="CPCD50">CPCD50</option>
                            <option value="CPCD30">CPCD30</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="equipment_serial_no">Equipment Serial Number</label>
                        <input type="text" id="equipment_serial_no" name="equipment_serial_no" placeholder="Enter serial number">
                    </div>
                    <div class="form-group">
                        <label for="equipment_id_no">Equipment ID Number</label>
                        <input type="text" id="equipment_id_no" name="equipment_id_no" placeholder="Enter ID number">
                    </div>
                    <div class="form-group">
                        <label for="manufacturing_date">Manufacturing Date</label>
                        <input type="date" id="manufacturing_date" name="manufacturing_date">
                    </div>
                </div>
                <div id="checklist" class="tab-content">
                    <div class="checklist-group">
                        <h3>Visual Inspection</h3>
                        <div class="checklist-item">
                            <span class="checklist-item-desc">Check for cracks or damage on chassis</span>
                            <div class="checklist-item-opts">
                                <label><input type="radio" name="chassis_check" value="pass"> Pass</label>
                                <label><input type="radio" name="chassis_check" value="fail"> Fail</label>
                                <label><input type="radio" name="chassis_check" value="na"> N/A</label>
                            </div>
                        </div>
                        <div class="checklist-item">
                            <span class="checklist-item-desc">Inspect tire condition and pressure</span>
                            <div class="checklist-item-opts">
                                <label><input type="radio" name="tire_check" value="pass"> Pass</label>
                                <label><input type="radio" name="tire_check" value="fail"> Fail</label>
                                <label><input type="radio" name="tire_check" value="na"> N/A</label>
                            </div>
                        </div>
                    </div>
                    <div class="checklist-group">
                        <h3>Functional Tests</h3>
                        <div class="checklist-item">
                            <span class="checklist-item-desc">Test brake effectiveness</span>
                            <div class="checklist-item-opts">
                                <label><input type="radio" name="brake_test" value="pass"> Pass</label>
                                <label><input type="radio" name="brake_test" value="fail"> Fail</label>
                                <label><input type="radio" name="brake_test" value="na"> N/A</label>
                            </div>
                        </div>
                        <div class="checklist-item">
                            <span class="checklist-item-desc">Check horn and reverse alarm</span>
                            <div class="checklist-item-opts">
                                <label><input type="radio" name="alarm_test" value="pass"> Pass</label>
                                <label><input type="radio" name="alarm_test" value="fail"> Fail</label>
                                <label><input type="radio" name="alarm_test" value="na"> N/A</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="review" class="tab-content">
                    <div class="form-group">
                        <label for="tested_load_kg">Tested Load (kg)</label>
                        <input type="text" id="tested_load_kg" name="tested_load_kg" placeholder="Enter tested load in kg">
                    </div>
                    <div class="form-group">
                        <label for="final_result">Final Result</label>
                        <select id="final_result" name="final_result">
                            <option value="Accepted">Accepted</option>
                            <option value="Rejected">Rejected</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="inspector_name">Inspector Name</label>
                        <select id="inspector_name" name="inspector_name">
                            <option value="John Doe">John Doe</option>
                            <option value="Jane Smith">Jane Smith</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Generate PDF</button>
            </form>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="../js/pdf-generator.js"></script>
</body>
</html>
